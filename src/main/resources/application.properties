# ===============================
# APP NAME
# ===============================
spring.application.name=psychocare-backend

# ===============================
# DATABASE CONFIG
# Railway MySQL URL ENV se aayega
# Railway pe: DB_URL, DB_USER, DB_PASS set karo
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/psychocare_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# SERVER CONFIG
# Railway khud port assign karta hai
# ===============================
server.port=${PORT:8080}

# ===============================
# JWT CONFIG
# Railway pe JWT_SECRET ENV set karna
# ===============================
jwt.secret=${JWT_SECRET:TXlTdXBlclNlY3JldEtleUZvckpXVC1QeXNjaG9DYXJlLTI1NkJpdHM=}
jwt.expiration=86400000

# ===============================
# MAIL CONFIG
# Railway pe MAIL_USER aur MAIL_PASS ENV set karna
# Gmail App Password use karna (2FA on karo, phir App Password banao)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:noreply@psychocare.com}
spring.mail.password=${MAIL_PASS:yourapppassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# FILE UPLOAD CONFIG
# Cloudinary use karenge ? ye paths ab sirf fallback hain
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/
app.upload.cv.dir=uploads/cv/
app.upload.profile.dir=uploads/profiles/

# Cloudinary credentials ? Railway pe set karna
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}

# ===============================
# SECURITY
# ===============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ===============================
# LOGGING ? Production me minimal
# ===============================
logging.level.com.psychocare=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type=OFF
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.transaction=WARN

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss