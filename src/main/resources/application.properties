spring.application.name=psychocare-backend

# ===============================
# DATABASE CONFIG (MYSQL)
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/psychocare_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===============================
# SERVER CONFIG
# ===============================
server.port=9090

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=TXlTdXBlclNlY3JldEtleUZvckpXVC1QeXNjaG9DYXJlLTI1NkJpdHM=
jwt.expiration=86400000

# ===============================
# MAIL CONFIG
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@psychocare.com
spring.mail.password=yourapppassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# FILE UPLOAD CONFIG
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/
app.upload.cv.dir=uploads/cv/
app.upload.profile.dir=uploads/profiles/

# ===============================
# SECURITY - DISABLE DEFAULT LOGIN PAGE
# ===============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ===============================
# LOGGING - Hibernate SQL queries completely OFF
# ===============================
logging.level.com.psychocare=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.hibernate.type=OFF
logging.level.org.springframework.orm.jpa=WARN
logging.level.org.springframework.transaction=WARN

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
